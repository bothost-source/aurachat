name: Build TARRIFIC CHAT

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android project
        run: |
          flutter create . --platforms=android
          flutter pub get

      - name: Add Firebase Config
        run: |
          # Create android/app folder if not exists
          mkdir -p android/app
          
          # Copy google-services.json from repo root
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
          fi
          
          # Add Firebase plugin to APP-LEVEL build.gradle (line 3 area)
          sed -i '2a\    id "com.google.gms.google-services"' android/app/build.gradle
          
          # Add Firebase classpath to PROJECT-LEVEL build.gradle
          sed -i 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.1"/' android/build.gradle

      - name: Build APK
        run: |
          flutter build apk --release --obfuscate --split-debug-info=symbols/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tarrific-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ github.run_number }}
          name: "TARRIFIC CHAT v${{ github.run_number }}"
          body: "TARRIFIC CHAT Release"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Web project & Build
        run: |
          flutter config --enable-web
          flutter create . --platforms=web
          flutter pub get
          flutter build web --release

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
