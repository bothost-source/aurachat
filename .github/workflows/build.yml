name: Build TARRIFIC CHAT

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter Project & Patch Android
        run: |
          mkdir -p /tmp/tarrific-code
          cp -r lib /tmp/tarrific-code/
          cp pubspec.yaml /tmp/tarrific-code/
          cd /tmp
          flutter create --org com.tarrific tarrific_chat
          cp -r /tmp/tarrific-code/lib/* tarrific_chat/lib/
          cp /tmp/tarrific-code/pubspec.yaml tarrific_chat/
          cd tarrific_chat
          
          # Patch Android build.gradle for compatibility
          sed -i "s/ext.kotlin_version = '<latest-version>'/ext.kotlin_version = '1.9.0'/g" android/build.gradle
          sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.1.0/g" android/build.gradle
          
          # Fix settings.gradle
          cat > android/settings.gradle << 'EOF'
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}
include ":app"
EOF
          
          flutter pub get

      - name: Build Android APK
        run: |
          cd /tmp/tarrific_chat
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tarrific-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ github.run_number }}
          name: "TARRIFIC CHAT v${{ github.run_number }}"
          body: "TARRIFIC CHAT Release"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter Project & Build Web
        run: |
          mkdir -p /tmp/tarrific-code
          cp -r lib /tmp/tarrific-code/
          cp pubspec.yaml /tmp/tarrific-code/
          cd /tmp
          flutter create --org com.tarrific tarrific_chat
          cp -r /tmp/tarrific-code/lib/* tarrific_chat/lib/
          cp /tmp/tarrific-code/pubspec.yaml tarrific_chat/
          cd tarrific_chat
          flutter config --enable-web
          flutter pub get
          flutter build web --release
          cp -r build/web $GITHUB_WORKSPACE/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
