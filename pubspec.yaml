name: tarrific_chat
description: TARRIFIC CHAT - Full-featured messaging app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    dio: ^5.4.0


  # Core
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.2

  # Supabase Backend
  supabase_flutter: ^2.5.0

  # Local Storage & Security
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # Notifications
  flutter_local_notifications: ^16.3.2
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.2

  # Image & Media
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Audio - Recording & Playback
  just_audio: ^0.9.38
  record: ^5.1.2
  audio_waveforms: ^1.0.5

  # File Handling
  file_picker: ^8.0.5
  open_filex: ^4.4.0
  path_provider: ^2.1.3
  dio: ^5.4.3
  mime: ^1.0.5

  # Emoji
  emoji_picker_flutter: ^2.2.0

  # Phone Input
  intl_phone_field: ^3.2.0

  # UI Components
  flutter_slidable: ^3.1.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Biometric
  local_auth: ^2.2.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.0
  http: ^1.2.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0

  # Connectivity
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/emojis/
    - assets/audio/
