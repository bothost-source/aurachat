name: Build TARRIFIC CHAT

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Save code and create project
        run: |
          mkdir -p /tmp/my-code
          cp -r lib /tmp/my-code/
          cp pubspec.yaml /tmp/my-code/
          cd /tmp
          flutter create --org com.tarrific tarrific_chat
          rm -rf tarrific_chat/lib
          cp -r /tmp/my-code/lib tarrific_chat/
          cp /tmp/my-code/pubspec.yaml tarrific_chat/
          cd tarrific_chat
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tarrific-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ github.run_number }}
          name: "TARRIFIC CHAT v${{ github.run_number }}"
          body: "TARRIFIC CHAT Release"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Save code and create project
        run: |
          mkdir -p /tmp/my-code
          cp -r lib /tmp/my-code/
          cp pubspec.yaml /tmp/my-code/
          cd /tmp
          flutter create --org com.tarrific tarrific_chat
          rm -rf tarrific_chat/lib
          cp -r /tmp/my-code/lib tarrific_chat/
          cp /tmp/my-code/pubspec.yaml tarrific_chat/
          cd tarrific_chat
          flutter config --enable-web
          flutter pub get
          flutter build web --release
          cp -r build/web $GITHUB_WORKSPACE/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
